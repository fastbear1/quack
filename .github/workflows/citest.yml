name: Tests
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
    tests:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v5
          with:
            fetch-depth: 0

        - name: 🧱 Setup Go
          uses: actions/setup-go@v5
          with:
            go-version: '1.26.4'
            cache: true

        - name: 🏗️ Tests
          run: make test

